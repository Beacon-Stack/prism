name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write  # required to push to ghcr.io

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    # testutil.NewTestDB (internal/testutil/db.go) creates a per-test Postgres
    # schema via the PRISM_TEST_DSN env var (falling back to
    # postgres://localhost:5432/prism_test as the default). A service container
    # provides that database to every integration test.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: runner
          POSTGRES_DB: prism_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PRISM_TEST_DSN: postgres://runner@localhost:5432/prism_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests (with race detector)
        run: go test -race -timeout 120s ./...

      - name: Run tests (coverage)
        run: go test -coverprofile=coverage.out -timeout 120s ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: web/ui/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/beacon-stack/prism/internal/version.Version=${VERSION} \
                      -X github.com/beacon-stack/prism/internal/version.BuildTime=${BUILD_TIME} \
                      -X github.com/beacon-stack/prism/internal/config.DefaultTMDBKey=${TMDB_API_KEY} \
                      -X github.com/beacon-stack/prism/internal/config.DefaultTraktClientID=${TRAKT_CLIENT_ID} \
                      -s -w" \
            -o bin/prism ./cmd/prism

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prism-linux-amd64
          path: bin/prism
          retention-days: 7

  docker:
    name: Docker
    runs-on: ubuntu-latest
    # Only build and push images on pushes to main (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, test-frontend, build]
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GHCR_TOKEN is a classic PAT with write:packages scope.
          # GITHUB_TOKEN consistently 403s on blob HEAD checks for new packages.
          # Token expires ~2026-06-01 — renew and update secret before then.
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (latest — alpine with ffprobe)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false

      - name: Build and push (minimal — scratch, no ffprobe)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.minimal
          push: true
          # ghcr.io image names must be lowercase. github.repository preserves
          # the org casing ("Beacon-Stack/prism"), which GHCR rejects, so we
          # spell the repo out explicitly instead of using the expression.
          tags: ghcr.io/beacon-stack/prism:latest-minimal
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
