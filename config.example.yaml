## Prism configuration example
## Copy to ~/.config/prism/config.yaml and edit to suit.
##
## All values can be overridden by environment variables.
## Prefix the key path with PRISM_ and replace dots with underscores.
## Example: server.port → PRISM_SERVER_PORT=8080

# ── HTTP server ───────────────────────────────────────────────────────────────
server:
  # Address to listen on. Use 0.0.0.0 to listen on all interfaces.
  host: "0.0.0.0"
  # Port to listen on. Default: 8282.
  # Note: Radarr uses 7878 — if running both during migration, leave this as-is.
  port: 8282

# ── Database ──────────────────────────────────────────────────────────────────
database:
  # Driver: "sqlite" (default) or "postgres"
  driver: sqlite

  # SQLite: path to the database file.
  # Default: ~/.config/prism/prism.db
  # path: /path/to/prism.db

  # PostgreSQL: full connection string.
  # Only used when driver is "postgres".
  # dsn: "postgres://user:password@localhost:5432/prism?sslmode=require"

# ── Logging ───────────────────────────────────────────────────────────────────
log:
  # Level: debug | info | warn | error  (default: info)
  level: info
  # Format: json | text
  #   json  — structured JSON, suitable for log shippers (Loki, Datadog, etc.)
  #   text  — human-readable key=value, better for local development
  format: json

# ── Authentication ────────────────────────────────────────────────────────────
auth:
  # API key required in the X-Api-Key header for all API requests.
  # If empty, a random key is generated on first startup and automatically
  # saved to this file — so it persists across restarts without any action
  # from you. You can also set it explicitly here if you prefer.
  api_key: ""

# ── TMDB (The Movie Database) ─────────────────────────────────────────────────
# Required for movie search and metadata fetching.
# Get a free API key at: https://www.themoviedb.org/settings/api
#
# If not configured, a WARNING is shown on startup and metadata features
# are disabled. Prism will still run and manage existing library files.
tmdb:
  api_key: ""

# ── AI features (Claude) ─────────────────────────────────────────────────────
# Optional. When configured, enables AI-assisted release matching,
# scoring, and filtering via the Anthropic Claude API.
#
# If not configured, rule-based fallbacks are used automatically.
# Get an API key at: https://console.anthropic.com
ai:
  api_key: ""

  # Models used for each AI feature.
  # Defaults shown below — only change if you know what you're doing.
  # match_model:  "claude-sonnet-4-6"          # accuracy matters
  # score_model:  "claude-haiku-4-5-20251001"  # high volume, latency matters
  # filter_model: "claude-haiku-4-5-20251001"  # high volume, latency matters

# ── Configurarr integration (optional) ──────────────────────────────────────
# When configured, Prism registers itself with the Configurarr control plane
# on startup. This enables auto-discovery of ecosystem services, shared config,
# and centralized indexer management.
#
# Set the URL and API key of your Configurarr instance.
# If not configured, Prism runs standalone (no change in behavior).
pulse:
  # url: "http://pulse:9696"
  # api_key: ""
